name: Build and publish

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate extension
        run: npm run web-ext:lint

      - name: Package unsigned extension
        run: npm run web-ext:build

      - name: Upload unsigned package
        uses: actions/upload-artifact@v4
        with:
          name: firefox-vault-unsigned
          path: web-ext-artifacts/*.zip
          if-no-files-found: error

  sign:
    name: Sign with Mozilla Add-ons
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release version
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./public/manifest.json').version")"

          if [ "${package_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}." >&2
            exit 1
          fi

          if [ "${manifest_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match public/manifest.json version ${manifest_version}." >&2
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Sign extension
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          AMO_CHANNEL: ${{ vars.AMO_CHANNEL }}
          AMO_METADATA: ${{ vars.AMO_METADATA }}
          AMO_UPLOAD_SOURCE: ${{ vars.AMO_UPLOAD_SOURCE }}
        run: |
          set -euo pipefail

          if [ -z "${AMO_JWT_ISSUER}" ] || [ -z "${AMO_JWT_SECRET}" ]; then
            echo "AMO_JWT_ISSUER and AMO_JWT_SECRET repository secrets are required for signing." >&2
            exit 1
          fi

          channel="${AMO_CHANNEL:-unlisted}"
          args=(
            --source-dir dist
            --artifacts-dir web-ext-artifacts
            --api-key "${AMO_JWT_ISSUER}"
            --api-secret "${AMO_JWT_SECRET}"
            --channel "${channel}"
          )

          if [ -n "${AMO_METADATA}" ]; then
            args+=(--amo-metadata "${AMO_METADATA}")
          fi

          if [ "${AMO_UPLOAD_SOURCE:-false}" = "true" ]; then
            source_archive="web-ext-artifacts/firefox-vault-source-${GITHUB_REF_NAME}.zip"
            mkdir -p web-ext-artifacts
            git archive --format=zip --output "${source_archive}" HEAD
            args+=(--upload-source-code "${source_archive}")
          fi

          npx web-ext sign "${args[@]}"

      - name: Upload signed package
        uses: actions/upload-artifact@v4
        with:
          name: firefox-vault-signed
          path: |
            web-ext-artifacts/*.xpi
            web-ext-artifacts/*.zip
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Signed Firefox Vault build."
          fi

          gh release upload "${GITHUB_REF_NAME}" web-ext-artifacts/* --clobber
