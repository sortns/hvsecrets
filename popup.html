<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HVSecrets</title>
    <script type="module" src="/src/popup/index.ts"></script>
  </head>
  <body>
    <main>
      <h1>HVSecrets</h1>
      <dl>
        <div>
          <dt>Vault</dt>
          <dd id="vault-url">Loading</dd>
        </div>
        <div>
          <dt>Path</dt>
          <dd id="vault-path">Loading</dd>
        </div>
        <div>
          <dt>Auth</dt>
          <dd id="auth-state">Loading</dd>
        </div>
      </dl>

      <section>
        <h2>Credentials</h2>
        <ul id="credential-list"></ul>
      </section>

      <footer>
        <button id="refresh" type="button">Refresh</button>
        <button id="validate-token" type="button">Check Connection</button>
        <button id="login-oidc" type="button">OIDC Login</button>
        <button id="login-approle" type="button">AppRole Login</button>
        <button id="search-secrets" type="button">Search Secrets</button>
        <button id="open-options" type="button">Options</button>
      </footer>
      <p id="status" role="status"></p>

      <section id="search-section" hidden>
        <h2>Search Secrets</h2>
        <form id="search-form">
          <input
            id="search-query"
            name="query"
            type="search"
            placeholder="Site name or origin"
            autocomplete="off"
          />
          <button type="submit">Search</button>
        </form>
        <ul id="search-results"></ul>
      </section>
    </main>
  </body>
</html>
